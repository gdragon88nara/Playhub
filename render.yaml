# Render blueprint — ONE web service running the whole app (Next.js UI +
# Django/Channels API + WebSockets) behind nginx, on a single URL, plus a
# managed Postgres. Deploy in one step:
#   Render -> New + -> Blueprint -> pick this repo -> Apply
#
# No frontend/backend URL wiring, no CORS setup: the UI and API share one origin.

databases:
  - name: playhub-db
    plan: free

services:
  - type: web
    name: playhub
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: playhub-db
          property: connectionString
      # Realtime uses the in-process channel layer (single instance) — no Redis
      # needed. Payments run in simulation mode until Stripe keys are set here.
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
